services:
  db:
    image: postgres:16-alpine
    container_name: learntracker-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learntracker}
      POSTGRES_USER: ${POSTGRES_USER:-learntracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learntracker123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learntracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

